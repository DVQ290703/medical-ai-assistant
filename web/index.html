<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trợ lý thông tin y tế</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <button id="new-chat" type="button">＋ Hội thoại mới</button>
      <nav id="convo-list"></nav>
      <p class="side-note">Thông tin tham khảo — không thay thế bác sĩ.</p>
    </aside>

    <div id="main">
      <header>
        <button id="menu-toggle" type="button" title="Danh sách hội thoại">☰</button>
        <h1>🩺 Trợ lý thông tin y tế</h1>
      </header>

      <main id="chat"></main>

      <form id="form">
        <input id="input" type="text" autocomplete="off"
               placeholder="Nhập câu hỏi sức khoẻ..." required>
        <button type="submit" id="send">Gửi</button>
      </form>
    </div>
  </div>

  <script src="/chat.js"></script>
</body>
</html>
