<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trợ lý thông tin y tế</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>🩺 Trợ lý thông tin y tế</h1>
    <p class="sub">Thông tin tham khảo — không thay thế chẩn đoán của bác sĩ.</p>
  </header>

  <main id="chat"></main>

  <form id="form">
    <input id="input" type="text" autocomplete="off"
           placeholder="Nhập câu hỏi sức khoẻ..." required>
    <button type="submit" id="send">Gửi</button>
  </form>

  <script src="/chat.js"></script>
</body>
</html>
