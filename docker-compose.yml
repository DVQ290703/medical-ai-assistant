# CHỈ Docker hoá app FastAPI. Qdrant DÙNG LẠI cái đang chạy sẵn trên máy host
# (đã có 158k điểm) — app trỏ tới host qua host.docker.internal.
# encode/rerank vẫn REMOTE trên Colab (ngrok) — set RAG_REMOTE_* trong .env.
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Qdrant: LOCAL (host) -> host.docker.internal:6333. CLOUD (deploy) -> set QDRANT_URL
      # + QDRANT_API_KEY trong .env (khi có, code ưu tiên URL, bỏ qua host/port).
      - QDRANT_HOST=host.docker.internal
      - QDRANT_PORT=6333
      - QDRANT_URL=${QDRANT_URL:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RAG_REMOTE_URL=${RAG_REMOTE_URL}
      - RAG_REMOTE_TOKEN=${RAG_REMOTE_TOKEN}
    extra_hosts:
      # cần trên Linux; Docker Desktop (Windows/Mac) đã có sẵn nhưng khai báo cho chắc
      - "host.docker.internal:host-gateway"
